apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          ports:
            - containerPort: 5001
          env:
            - name: MONGO_URI
              value: "YOUR_MONGO_URI"
            - name: JWT_SECRET
              value: "super_secret_key_123"
            - name: PORT
              value: "5001"