apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctor-service
  template:
    metadata:
      labels:
        app: doctor-service
    spec:
      containers:
        - name: doctor-service
          image: doctor-service:latest
          ports:
            - containerPort: 5003
          env:
            - name: MONGO_URI
              value: "YOUR_MONGO_URI"
            - name: JWT_SECRET
              value: "super_secret_key_123"
            - name: PORT
              value: "5003"